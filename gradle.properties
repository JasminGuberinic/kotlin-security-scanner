# Build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
kotlin.incremental=true

# ── Maven Central publication ──────────────────────────────────────────────────
# Set these in ~/.gradle/gradle.properties (never commit credentials).
#
# ONE-TIME SETUP:
# 1. Register at https://central.sonatype.com and create a namespace for
#    com.jasmin.security (verify via GitHub: https://central.sonatype.com/publishing/namespaces)
# 2. Generate a Portal token: Account → Access User Token
# 3. Create a GPG key and export the secret key:
#      gpg --full-generate-key
#      gpg --export-secret-keys --armor KEY_ID | base64 -w0 > signing.key.b64
# 4. Add to ~/.gradle/gradle.properties:
#      mavenCentralUsername=<portal-token-username>
#      mavenCentralPassword=<portal-token-password>
#      signingInMemoryKey=<base64-content-of-signing.key.b64>
#      signingInMemoryKeyId=<last-8-chars-of-gpg-key-id>
#      signingInMemoryKeyPassword=<gpg-passphrase>
# 5. For GitHub Actions, add the same values as repository secrets
#    (see .github/workflows/release.yml for exact secret names).
