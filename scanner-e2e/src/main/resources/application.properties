# ── Spring Boot — PropertiesSecurityRule coverage ────────────────────────────

# JwtSecretInPropertiesRule [A02, CWE-798]
spring.security.oauth2.resourceserver.jwt.secret=my-hardcoded-jwt-secret-for-production

# SpringDatasourcePasswordRule / HardcodedCredentials [A07, CWE-798]
spring.datasource.password=hardcoded-db-password

# OAuth2 client secret in properties [A07, CWE-798]
spring.security.oauth2.client.registration.google.client-secret=oauth-secret-123

# InsecureSmtpConfig — STARTTLS disabled [A02, CWE-319]
spring.mail.properties.mail.smtp.starttls.enable=false

# MissingHttpsRedirect (properties variant) — config server over HTTP [A02, CWE-319]
spring.cloud.config.uri=http://config-server:8888

# InsecureActuatorExposure — all endpoints exposed [A05, CWE-16]
management.endpoints.web.exposure.include=*

# Actuator shutdown enabled [A05, CWE-16]
management.endpoint.shutdown.enabled=true

# KafkaInsecureProtocol [A05, CWE-319]
spring.kafka.security.protocol=PLAINTEXT

# KafkaTrustedPackagesWildcard [A05, CWE-502]
spring.kafka.consumer.properties.spring.deserializer.value.trusted.packages=*

# ShowSqlEnabled — SQL logged in production [A09, CWE-532]
spring.jpa.show-sql=true

# H2ConsoleEnabled — dev console open in production [A05, CWE-16]
spring.h2.console.enabled=true

# SpringSecurityDebugEnabled [A09, CWE-532]
logging.level.org.springframework.security=DEBUG

# ── Dropwizard — PropertiesSecurityRule coverage ─────────────────────────────

# DropwizardAdminConnectorExposed [A05, CWE-16]
server.adminConnectors[0].bindHost=0.0.0.0

# DropwizardMaxEntitySize — oversized payload [A05, CWE-400]
server.maxRequestEntitySize=500MiB

# DropwizardDatabasePasswordRule [A07, CWE-798]
database.password=myS3cretPass

# ── Quarkus — PropertiesSecurityRule coverage ────────────────────────────────

# QuarkusHardcodedDatasourcePassword [A07, CWE-798]
quarkus.datasource.password=hardcoded-quarkus-password

# QuarkusCorsPermissiveConfig [A05, CWE-346]
quarkus.http.cors.origins=*

# QuarkusDevServicesInProd [A05, CWE-16]
%prod.quarkus.devservices.enabled=true

# QuarkusMultipartInsecure — large multipart limit [A05, CWE-400]
quarkus.http.limits.max-body-size=500M

# QuarkusSmallRyeHealthInsecure — health UI in prod [A05, CWE-16]
quarkus.smallrye-health.ui.enable=true

# QuarkusSwaggerUiInProd — swagger UI always on [A05, CWE-16]
quarkus.swagger-ui.always-include=true

# QuarkusOidcInsecureConfig — TLS verification disabled [A02, CWE-295]
quarkus.oidc.tls.verification=none

# QuarkusGrpcInsecure — gRPC plaintext [A02, CWE-319]
quarkus.grpc.clients.payment.plain-text=true

# QuarkusMongoInsecure — MongoDB without auth [A02, CWE-319]
quarkus.mongodb.connection-string=mongodb://localhost:27017/mydb

# QuarkusSmallryeJwtInsecure — hardcoded JWT signing secret [A07, CWE-798]
mp.jwt.verify.secret.value=hardcoded-jwt-signing-secret

# QuarkusRedisInsecure — Redis without TLS [A02, CWE-319]
quarkus.redis.hosts=redis://localhost:6379

# QuarkusOidcAudienceMissing — OIDC configured without token.audience [A02, CWE-347]
# Rule fires when quarkus.oidc.auth-server-url exists but token.audience is absent
quarkus.oidc.auth-server-url=https://keycloak.example.com/realms/myapp
